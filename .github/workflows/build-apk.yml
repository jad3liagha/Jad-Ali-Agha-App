name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create www folder and copy web files
        run: |
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          ls -la www/

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Create Capacitor project
        run: |
          npx cap init JadAliAgha com.jadaliagha.app --web-dir=www
          npx cap add android

      - name: Sync and Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JadAliAgha-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
