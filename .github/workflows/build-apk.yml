name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create www folder and copy web files
        run: |
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          echo "Contents of www:"
          ls -la www/
          # تأكد من وجود index.html
          if [ -f www/index.html ]; then echo "✅ index.html found"; else echo "❌ index.html NOT found"; exit 1; fi

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Create Capacitor project
        run: |
          npx cap init JadAliAgha com.jadaliagha.app --web-dir=www
          npx cap add android

      - name: Fix Gradle Java compatibility
        run: |
          # تعديل ملف build.gradle لمشروع Android لضبط Java 17
          cd android
          echo "android {
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
          }" >> app/build.gradle

      - name: Sync and Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JadAliAgha-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
