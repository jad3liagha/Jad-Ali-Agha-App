name: Build APK

on:
  push:
    branches: [ main ]  # أو master حسب الفرع الرئيسي لديك
  workflow_dispatch:   # للبناء يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Create Capacitor project
        run: |
          npx cap init JadAliAgha com.jadaliagha.app --web-dir=.
          npx cap add android

      - name: Sync and Build APK
        run: |
          npx cap sync android
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
